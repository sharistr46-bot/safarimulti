name: Build & Security Audit

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-audit:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install ldid xz make
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"

      - name: Setup iOS SDK (latest stable)
        run: |
          ls /Applications/ | grep Xcode || true
          sudo xcode-select -p

      - name: Build (FINALPACKAGE=1)
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Locate built dylib
        id: locate
        run: |
          DYLIB=$(find .theos -name 'safarimultid.dylib' -not -path '*.unsigned*' | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: no built dylib found under .theos/"
            find .theos -type f | head -20
            exit 1
          fi
          echo "dylib=$DYLIB" >> "$GITHUB_OUTPUT"
          echo "Found dylib: $DYLIB"

      - name: Run audit
        run: |
          chmod +x ci/audit.sh
          ./ci/audit.sh "${{ steps.locate.outputs.dylib }}" ./safarimultid.plist

      - name: Generate release artifacts
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          chmod +x ci/release_artifacts.sh
          VERSION="${GITHUB_REF#refs/tags/v}"
          # 适配 dylib 实际位置
          mkdir -p .theos/obj/release
          cp "${{ steps.locate.outputs.dylib }}" .theos/obj/release/safarimultid.dylib
          ./ci/release_artifacts.sh "$VERSION"

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release/

      - name: Attach to release (creates release if missing)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/v*/*.deb
            release/v*/SHA256.txt
            release/v*/SHA512.txt
            release/v*/symbols-undefined.txt
            release/v*/symbols-defined.txt
            release/v*/strings.txt
            release/v*/dylib-deps.txt
            release/v*/load-commands.txt
            release/v*/MANIFEST.txt
